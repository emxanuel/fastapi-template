name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: pytest-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      # Exit 5 means no tests were collected; allow that until the suite has real tests.
      - name: Run pytest
        run: |
          set +e
          uv run pytest
          code=$?
          set -e
          if [ "$code" -eq 5 ]; then
            echo "No tests collected (pytest exit 5); allowing success until the suite is populated."
            exit 0
          fi
          exit "$code"
